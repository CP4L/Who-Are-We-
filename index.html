<!DOCTYPE html>
<html>
<head>
    <title>My 4 Photos</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
            font-family: sans-serif;
        }
        .gallery {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            max-width: 1200px;
        }
        img {
            flex: 1 1 350px;
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            object-fit: cover;
        }
        @media (max-width: 600px) {
            .gallery { padding: 10px; gap: 15px; }
        }
    </style>
</head>
<body>
    <div class="gallery">
        <img src="image1.jpg" alt="Photo 1">
        <img src="image2.jpg" alt="Photo 2">
        <img src="image3.jpg" alt="Photo 3">
        <img src="image4.jpg" alt="Photo 4">
    </div>
</body>
</html>
